play {
  http {
    # Min. ~256 bitów entropii dla HS256 (Play 3); nadpisz FILE_API_PLAY_HTTP_SECRET w .env.cfg
    secret.key = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    secret.key = ${?FILE_API_PLAY_HTTP_SECRET}

    parser {
      maxMemoryBuffer = 32MB
      maxDiskBuffer = 128MB
    }
  }

  server {
    http {
      port = 8080
      port = ${?FILE_API_HTTP_PORT}
      address = "0.0.0.0"
      address = ${?FILE_API_HTTP_HOST}
    }
  }

  modules {
    enabled += "com.portfolio.files.Module"
  }

  filters {
    disabled += "play.filters.hosts.AllowedHostsFilter"
    disabled += "play.filters.csrf.CSRFFilter"
  }
}
