server {
    listen 80;

    # frontend (React build)
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # /account
    location /account/ {
        proxy_pass http://account:8001/api/v1/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /blogs
    location /blogs/ {
        proxy_pass http://blog:8000/api/v1/blogs/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /countries (external API)
    location /countries/ {
        proxy_pass https://restcountries.com/v2/all?fields=name;
        
        proxy_set_header Host restcountries.com;
    }

    # /monitor-api
    location /monitor-api/ {
        proxy_pass http://website-monitor:8085/api/v1/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}